name: CI/CD Issue
description: Report a CI/CD workflow issue
title: "[CI]: <brief description>"
labels: ["ci-cd"]
body:
	- type: markdown
		attributes:
			value: |
				Thanks for reporting a CI/CD issue! Please provide as much detail as possible.

	- type: dropdown
		attributes:
			label: Affected Workflow
			description: Select the affected CI/CD workflow
			options:
				- ci.yml
				- clippy.yml
				- fmt.yml
				- security-audit.yml
				- test.yml
				- todo-check.yml
				- Other (specify below)
		validations:
			required: true

	- type: textarea
		attributes:
			label: Issue Description
			description: Clearly describe the CI/CD issue
			placeholder: |
				Example: The test workflow fails consistently on the main branch
				with a build error when compiling the nuages-controller crate.
		validations:
			required: true

	- type: textarea
		attributes:
			label: Steps to Reproduce
			description: Steps to reproduce the CI/CD issue
			placeholder: |
				1. Push to main branch
				2. GitHub Actions workflow test.yml starts
				3. Workflow fails at "Run tests" step
				4. Error: "error[E0432]: unresolved import"
		validations:
			required: true

	- type: textarea
		attributes:
			label: Error Logs
			description: Paste the relevant error logs
			placeholder: |
				error[E0432]: unresolved import `nuages_controller::reconciler`
				  --> src/main.rs:3:5
				  |
				3 | use nuages_controller::reconciler;
				  |     ^^^^^^^^^^^^^^^^^^^^^^^^^^^^^ no `reconciler` in the root
			render: shell
		validations:
			required: true

	- type: dropdown
		attributes:
			label: Runner OS
			description: Select the GitHub Actions runner operating system
			options:
				- ubuntu-latest
				- macos-latest
				- windows-latest
				- Self-hosted
			multiple: true
		validations:
			required: true

	- type: input
		attributes:
			label: Workflow Run URL
			description: Link to the failed workflow run
			placeholder: https://github.com/kent8192/nuages/actions/runs/1234567890
		validations:
			required: false

	- type: textarea
		attributes:
			label: Local Test Results
			description: Do the tests pass locally? If yes, what's different?
			placeholder: |
				Tests pass locally with:
				- Rust stable
				- macOS 15.0

				Difference in CI:
				- CI runner: ubuntu-latest
				- Different Rust toolchain version?
		validations:
			required: true

	- type: checkboxes
		attributes:
			label: Impact Assessment
			description: Help us assess the impact of this CI/CD issue
			options:
				- label: "Blocks all pull requests from merging"
				- label: "Affects specific workflows only"
				- label: "Intermittent failure (not consistent)"
				- label: "Workaround available"
		validations:
			required: true

	- type: textarea
		attributes:
			label: Additional Context
			description: Any other context or relevant information
			placeholder: |
				- Issue started after merging commit abc123
				- Affects both main and feature branches
				- Related issue: #123
		validations:
			required: false
