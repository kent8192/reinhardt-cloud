name: Bruno API Tests

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label JSON. Use "\"ubuntu-latest\"" for GitHub-hosted or "[\"self-hosted\",\"linux\",\"arm64\",\"reinhardt-cloud-ci\"]" for self-hosted.'
        type: string
        default: '"ubuntu-latest"'
      cargo-build-jobs:
        description: "Parallel cargo build jobs (1=GitHub-hosted OOM safe, 8=self-hosted)"
        type: string
        default: "1"
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_TARGET_DIR: /tmp/cargo_target
  CARGO_INCREMENTAL: 0
  CARGO_BUILD_JOBS: ${{ inputs.cargo-build-jobs || '1' }}

jobs:
  bruno-tests:
    name: Bruno API Tests
    runs-on: ${{ fromJSON(inputs.runner || '"ubuntu-latest"') }}
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: reinhardt_cloud_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # Mailpit captures SMTP so registration's verification-email step
      # succeeds without needing a real mail server. The Bruno scenarios
      # don't assert email contents; Mailpit just needs to accept SMTP.
      mailpit:
        image: axllent/mailpit:v1.20
        ports:
          - 1025:1025
          - 8025:8025
        env:
          MP_SMTP_AUTH_ACCEPT_ANY: 'true'
          MP_SMTP_AUTH_ALLOW_INSECURE: 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Login to Docker Hub
        uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli@3.1.3

      - name: Build application
        run: cargo build --locked --package reinhardt-cloud-dashboard --bin manage

      - name: Run database migrations
        working-directory: dashboard
        run: cargo run --locked --package reinhardt-cloud-dashboard --bin manage migrate
        env:
          REINHARDT_ENV: ci
          REINHARDT_CLOUD_JWT_SECRET: "ci-test-secret-minimum-32-bytes-long!!"
          REINHARDT_CLOUD_REDIS_URL: "redis://localhost:6379/0"
          REINHARDT_CORE__SECRET_KEY: "ci-test-core-secret-key-minimum-32-bytes"
          REINHARDT_DATABASE_PASSWORD: "postgres"

      - name: Start application server
        working-directory: dashboard
        run: |
          cargo run --locked --package reinhardt-cloud-dashboard --bin manage runserver &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> "$GITHUB_ENV"

          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://localhost:8000/api/openapi.json; then
              echo "Server is ready!"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          echo "::error::Server failed to start within 60 seconds"
          exit 1
        env:
          REINHARDT_ENV: ci
          REINHARDT_CLOUD_JWT_SECRET: "ci-test-secret-minimum-32-bytes-long!!"
          REINHARDT_CLOUD_REDIS_URL: "redis://localhost:6379/0"
          REINHARDT_CORE__SECRET_KEY: "ci-test-core-secret-key-minimum-32-bytes"
          REINHARDT_DATABASE_PASSWORD: "postgres"
          # Point registration at the Mailpit SMTP service so the verification
          # email step succeeds without a real mail server.
          REINHARDT_EMAIL__BACKEND: smtp
          REINHARDT_EMAIL__HOST: localhost
          REINHARDT_EMAIL__PORT: "1025"

      - name: Seed active test user for login scenarios
        run: |
          # Register the test user via API (created as inactive).
          # The `Origin` header is required to pass `OriginGuardMiddleware`,
          # which rejects state-changing requests from unrecognised origins.
          curl -sf -X POST http://localhost:8000/api/auth/register/ \
            -H "Content-Type: application/json" \
            -H "Origin: http://localhost:8000" \
            -d '{"username":"testuser","email":"test@ci.dev","password":"testpassword"}'
          # Activate the user directly in the database so login tests work
          # (email verification cannot be performed in Bruno CI tests).
          PGPASSWORD=postgres psql -h localhost -U postgres reinhardt_cloud_ci \
            -c "UPDATE auth_users SET is_active = true WHERE username = 'testuser'"

      - name: Run Bruno scenario tests
        working-directory: dashboard/tests/bruno
        run: bru run scenarios --env CI --bail

      - name: Stop application server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill "$SERVER_PID" 2>/dev/null || true
          fi
