name: Build Release Assets

on:
  push:
    tags:
      # release-plz tag format: reinhardt-cloud-*@v*
      - 'reinhardt-cloud-*@v*'

permissions:
  contents: write
  # Required for pushing images to GHCR in the build-agent-image job.
  packages: write

jobs:
  build-assets:
    name: Build ${{ matrix.binary }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: reinhardt-cloud-operator
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: reinhardt-cloud-operator
            cross: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: reinhardt-cloud
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: reinhardt-cloud
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: reinhardt-cloud

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cross (for cross-compilation)
        if: matrix.cross == true
        uses: taiki-e/install-action@de6bbd1333b8f331563d54a051e542c7dfef81c3 # v2
        with:
          tool: cross

      - name: Build binary (native)
        if: matrix.cross != true
        run: |
          cargo build --locked --release --bin ${{ matrix.binary }} --target ${{ matrix.target }}
          mv target/${{ matrix.target }}/release/${{ matrix.binary }} \
             ${{ matrix.binary }}-${{ matrix.target }}

      - name: Build binary (cross)
        if: matrix.cross == true
        run: |
          cross build --locked --release --bin ${{ matrix.binary }} --target ${{ matrix.target }}
          mv target/${{ matrix.target }}/release/${{ matrix.binary }} \
             ${{ matrix.binary }}-${{ matrix.target }}

      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: ${{ matrix.binary }}-${{ matrix.target }}

  build-agent-image:
    name: Build and publish reinhardt-cloud-agent image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Only publish the Agent image for agent releases. Using the release-plz
    # crate-scoped tag prefix keeps the image version aligned with the crate.
    if: startsWith(github.ref_name, 'reinhardt-cloud-agent@v')
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/reinhardt-cloud-agent

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Derive semver image tag
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
        # release-plz tags look like `reinhardt-cloud-agent@v0.1.0`. The
        # portion after `@` is the semver we want on the image tag.
        run: |
          semver="${REF_NAME##*@}"
          echo "semver=${semver}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      - name: Cache Buildx layers
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-agent-${{ github.ref_name }}
          restore-keys: |
            buildx-agent-

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6
        with:
          context: .
          file: crates/reinhardt-cloud-agent/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.semver }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate Buildx cache
        # Moves the fresh cache into place so the next run restores it cleanly
        # without the cache growing unbounded across runs.
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  build-dashboard-image:
    name: Build and publish reinhardt-cloud-dashboard image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Only publish the Dashboard image for dashboard releases. The
    # release-plz tag prefix keeps the image version aligned with the
    # `reinhardt-cloud-dashboard` crate.
    if: startsWith(github.ref_name, 'reinhardt-cloud-dashboard@v')
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/reinhardt-cloud-dashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Derive semver image tag
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
        # release-plz tags look like `reinhardt-cloud-dashboard@v0.1.0`.
        # The portion after `@` is the semver we want on the image tag.
        # Match `manifests/dashboard-app.yaml::spec.image`, which expects
        # the leading `v` to be stripped (the deploy workflow does the
        # same on its side).
        run: |
          semver="${REF_NAME##*@}"
          echo "semver=${semver#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      - name: Cache Buildx layers
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-dashboard-${{ github.ref_name }}
          restore-keys: |
            buildx-dashboard-

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6
        # The Dockerfile is auto-generated by `reinhardt-cloud init` from
        # the dashboard's `Cargo.toml` features and committed at
        # `dashboard/Dockerfile`. Build context is the workspace root so
        # the Dockerfile's `COPY . .` sees workspace-shared files
        # (Cargo.lock, rust-toolchain.toml).
        with:
          context: .
          file: dashboard/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.semver }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate Buildx cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  build-operator-image:
    name: Build and publish reinhardt-cloud-operator image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Only publish the Operator image for operator releases. The release-plz
    # crate-scoped tag prefix keeps the image version aligned with the crate.
    if: startsWith(github.ref_name, 'reinhardt-cloud-operator@v')
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/reinhardt-cloud-operator

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Derive semver image tag
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
        # release-plz tags look like `reinhardt-cloud-operator@v0.1.0`. The
        # portion after `@` is the semver we want on the image tag. Strip
        # the leading `v` so the tag matches `Chart.appVersion`, which the
        # Helm chart resolves via `_helpers.tpl` without a prefix (mirrors
        # the dashboard image job).
        run: |
          semver="${REF_NAME##*@}"
          echo "semver=${semver#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      - name: Cache Buildx layers
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-operator-${{ github.ref_name }}
          restore-keys: |
            buildx-operator-

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6
        with:
          context: .
          file: crates/reinhardt-cloud-operator/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.semver }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate Buildx cache
        # Moves the fresh cache into place so the next run restores it cleanly
        # without the cache growing unbounded across runs.
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
