name: Build Release Assets

on:
  push:
    tags:
      # release-plz tag format: nuages-*@v*
      - 'nuages-*@v*'

permissions:
  contents: write

jobs:
  build-assets:
    name: Build ${{ matrix.binary }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: nuages-control
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: nuages-control
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: nuages-control
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: nuages-operator
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: nuages-operator
            cross: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: nuages-cli
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: nuages-cli
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: nuages-cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build binary (native)
        if: matrix.cross != true
        run: |
          cargo build --release --bin ${{ matrix.binary }} --target ${{ matrix.target }}
          mv target/${{ matrix.target }}/release/${{ matrix.binary }} \
             ${{ matrix.binary }}-${{ matrix.target }}

      - name: Build binary (cross)
        if: matrix.cross == true
        run: |
          cross build --release --bin ${{ matrix.binary }} --target ${{ matrix.target }}
          mv target/${{ matrix.target }}/release/${{ matrix.binary }} \
             ${{ matrix.binary }}-${{ matrix.target }}

      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.binary }}-${{ matrix.target }}
