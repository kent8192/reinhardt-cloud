name: Build Release Assets

on:
  push:
    tags:
      # release-plz tag format: reinhardt-cloud-*@v*
      - 'reinhardt-cloud-*@v*'

permissions:
  contents: write

jobs:
  build-assets:
    name: Build ${{ matrix.binary }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: reinhardt-cloud-operator
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: reinhardt-cloud-operator
            cross: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: reinhardt-cloud
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: reinhardt-cloud
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: reinhardt-cloud

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cross (for cross-compilation)
        if: matrix.cross == true
        uses: taiki-e/install-action@de6bbd1333b8f331563d54a051e542c7dfef81c3 # v2
        with:
          tool: cross

      - name: Build binary (native)
        if: matrix.cross != true
        run: |
          cargo build --release --bin ${{ matrix.binary }} --target ${{ matrix.target }}
          mv target/${{ matrix.target }}/release/${{ matrix.binary }} \
             ${{ matrix.binary }}-${{ matrix.target }}

      - name: Build binary (cross)
        if: matrix.cross == true
        run: |
          cross build --release --bin ${{ matrix.binary }} --target ${{ matrix.target }}
          mv target/${{ matrix.target }}/release/${{ matrix.binary }} \
             ${{ matrix.binary }}-${{ matrix.target }}

      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: ${{ matrix.binary }}-${{ matrix.target }}
