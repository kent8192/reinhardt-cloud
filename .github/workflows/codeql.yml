name: CodeQL Analysis

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label JSON'
        type: string
        default: '"ubuntu-latest"'
  workflow_dispatch:
  pull_request:
  schedule:
    # Run weekly on Monday at 04:00 UTC
    - cron: '0 4 * * 1'

concurrency:
  group: codeql-${{ github.head_ref || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: Analyze Rust code
    runs-on: ${{ fromJSON(inputs.runner || '"ubuntu-latest"') }}
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b1bff81932f5cdfc8695c7752dcee935dcd061c8 # v4
        with:
          languages: rust
          build-mode: none
          queries: security-and-quality
          config-file: .github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@b1bff81932f5cdfc8695c7752dcee935dcd061c8 # v4
        with:
          category: "/language:rust"
