name: Format Check

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label JSON. Use "\"ubuntu-latest\"" for GitHub-hosted or "[\"self-hosted\",\"linux\",\"arm64\",\"reinhardt-cloud-ci\"]" for self-hosted.'
        type: string
        default: '"ubuntu-latest"'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format Check
    runs-on: ${{ fromJSON(inputs.runner || '"ubuntu-latest"') }}
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust with rustfmt
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt

      - name: Install cargo-make
        uses: taiki-e/install-action@de6bbd1333b8f331563d54a051e542c7dfef81c3 # v2
        with:
          tool: cargo-make

      - name: Install reinhardt-admin
        # The dashboard depends on reinhardt-web via `branch = "develop/0.2.0"`
        # (see Cargo.toml). The page!/form! DSL formatter MUST be built from the
        # same reinhardt-web source so its formatting rules match the macro
        # syntax the code targets. A stale crates.io pin (previously
        # "=0.1.0-rc.15") produced spurious fmt diffs after the v0.2.0-rc.2 bump.
        # Keep this branch in sync with the reinhardt-web pin in Cargo.toml.
        run: cargo install --git https://github.com/kent8192/reinhardt-web --branch develop/0.2.0 reinhardt-admin-cli --locked

      - name: Check code formatting
        run: cargo make fmt-check
