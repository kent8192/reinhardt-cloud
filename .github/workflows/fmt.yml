name: Format Check

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label JSON. Use "\"ubuntu-latest\"" for GitHub-hosted or "[\"self-hosted\",\"linux\",\"arm64\",\"reinhardt-cloud-ci\"]" for self-hosted.'
        type: string
        default: '"ubuntu-latest"'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format Check
    runs-on: ${{ fromJSON(inputs.runner || '"ubuntu-latest"') }}
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Rust with rustfmt
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt

      - name: Install cargo-make
        uses: taiki-e/install-action@de6bbd1333b8f331563d54a051e542c7dfef81c3 # v2
        with:
          tool: cargo-make

      - name: Install Reinhardt formatting tools
        # Keep formatter package versions in sync with the reinhardt-web version
        # pinned in Cargo.toml so the page!/form! DSL formatter matches the macro
        # syntax the dashboard targets. Use immutable crates.io version pins here;
        # mutable Git branches are not safe for CI install-time code execution.
        run: |
          cargo install reinhardt-admin-cli --version "=0.3.0-rc.2" --locked
          cargo install reinhardt-formatter --version "=0.3.0-rc.2" --locked

      - name: Check code formatting
        run: cargo make fmt-check
