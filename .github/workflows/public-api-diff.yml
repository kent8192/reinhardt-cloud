name: Public API Diff

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label JSON'
        type: string
        default: '"ubuntu-latest"'
      cargo-build-jobs:
        description: "Parallel cargo build jobs"
        type: string
        default: "1"

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: ${{ inputs.cargo-build-jobs || '1' }}

jobs:
  public-api-diff:
    name: Public API Diff
    runs-on: ${{ fromJSON(inputs.runner || '"ubuntu-latest"') }}
    timeout-minutes: 360
    steps:
      - name: Free Disk Space (Ubuntu)
        if: ${{ !contains(inputs.runner || '', 'self-hosted') }}
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install nightly toolchain
        run: rustup install nightly --profile minimal

      - name: Install cargo-public-api
        continue-on-error: true
        id: install-public-api
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST_TAG=$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/cargo-public-api/cargo-public-api/releases/latest" \
            | jq -r '.tag_name')
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            TARGET="aarch64-unknown-linux-musl"
          else
            TARGET="x86_64-unknown-linux-musl"
          fi
          curl -fsSL -o /tmp/cargo-public-api.tar.gz \
            "https://github.com/cargo-public-api/cargo-public-api/releases/download/${LATEST_TAG}/cargo-public-api-${TARGET}.tar.gz"
          mkdir -p /tmp/cpa
          tar xzf /tmp/cargo-public-api.tar.gz -C /tmp/cpa/
          find /tmp/cpa -name 'cargo-public-api' -type f -exec mv {} ~/.cargo/bin/ \;
          rm -rf /tmp/cpa /tmp/cargo-public-api.tar.gz
          cargo public-api --version

      - name: Post public API diff comment
        if: >-
          steps.install-public-api.outcome == 'success' &&
          github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          BASELINE_REV: ${{ github.event.pull_request.base.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Discover library crates (no exclusions for reinhardt-cloud)
          CRATES=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[]
              | select(.targets[] | .kind[] == "lib")
              | .name')

          COMMENT_BODY=""
          HAS_CHANGES=false

          for crate in $CRATES; do
            echo "::group::Public API diff for $crate"
            DIFF_OUTPUT=$(cargo +nightly public-api diff "${BASELINE_REV}..HEAD" \
              --package "$crate" \
              --all-features \
              -sss 2>&1) || {
              echo "::warning::Failed to generate API diff for $crate"
              COMMENT_BODY="${COMMENT_BODY}
          <details>
          <summary><code>${crate}</code> — ⚠️ build failed</summary>

          \`\`\`
          ${DIFF_OUTPUT}
          \`\`\`

          </details>
          "
              HAS_CHANGES=true
              echo "::endgroup::"
              continue
            }
            echo "::endgroup::"

            if [ -z "$DIFF_OUTPUT" ]; then
              continue
            fi

            HAS_CHANGES=true
            ADDED=$(echo "$DIFF_OUTPUT" | grep -c '^+' || true)
            REMOVED=$(echo "$DIFF_OUTPUT" | grep -c '^-' || true)
            CHANGED=$(echo "$DIFF_OUTPUT" | grep -c '^~' || true)

            SUMMARY_PARTS=""
            [ "$ADDED" -gt 0 ] && SUMMARY_PARTS="${SUMMARY_PARTS}${ADDED} added"
            [ "$REMOVED" -gt 0 ] && SUMMARY_PARTS="${SUMMARY_PARTS:+${SUMMARY_PARTS}, }${REMOVED} removed"
            [ "$CHANGED" -gt 0 ] && SUMMARY_PARTS="${SUMMARY_PARTS:+${SUMMARY_PARTS}, }${CHANGED} changed"

            COMMENT_BODY="${COMMENT_BODY}
          <details>
          <summary><code>${crate}</code> — ${SUMMARY_PARTS}</summary>

          \`\`\`
          ${DIFF_OUTPUT}
          \`\`\`

          </details>
          "
          done

          if [ "$HAS_CHANGES" = "false" ]; then
            echo "No public API changes detected. Skipping comment."
            exit 0
          fi

          MARKER="<!-- public-api-diff -->"
          FULL_BODY=$(cat <<EOF
          ${MARKER}
          ## Public API Changes

          ${COMMENT_BODY}

          ---
          *Generated by cargo-public-api • \`-sss\` (simplified)*
          EOF
          )

          EXISTING_ID=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .node_id" \
            | head -1)

          if [ -n "$EXISTING_ID" ]; then
            gh api graphql \
              -f id="$EXISTING_ID" \
              -f body="$FULL_BODY" \
              -f query='
                mutation($id: ID!, $body: String!) {
                  updateIssueComment(input: {id: $id, body: $body}) {
                    issueComment { id }
                  }
                }'
            echo "Updated existing public API diff comment."
          else
            gh pr comment "$PR_NUMBER" --body "$FULL_BODY"
            echo "Created new public API diff comment."
          fi
