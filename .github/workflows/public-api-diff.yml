name: Public API Diff

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label JSON'
        type: string
        default: '"ubuntu-latest"'
      cargo-build-jobs:
        description: "Parallel cargo build jobs"
        type: string
        default: "1"

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: ${{ inputs.cargo-build-jobs || '1' }}

jobs:
  public-api-diff:
    name: Public API Diff
    runs-on: ${{ fromJSON(inputs.runner || '"ubuntu-latest"') }}
    timeout-minutes: 360
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Free Disk Space (Ubuntu)
        if: ${{ !contains(inputs.runner || '', 'self-hosted') }}
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install nightly toolchain
        run: rustup install nightly --profile minimal

      - name: Install cargo-public-api
        continue-on-error: true
        id: install-public-api
        run: cargo install cargo-public-api --version 0.51.0 --locked

      - name: Post public API diff comment
        if: >-
          steps.install-public-api.outcome == 'success' &&
          github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          BASELINE_REV: ${{ github.event.pull_request.base.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          CRATES=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[]
              | select(.targets[] | .kind[] == "lib")
              | .name')

          BODY_FILE=$(mktemp)
          HAS_CHANGES=false
          MARKER="<!-- public-api-diff -->"

          for crate in $CRATES; do
            echo "::group::Public API diff for $crate"
            if ! DIFF_OUTPUT=$(cargo +nightly public-api diff "${BASELINE_REV}..HEAD" \
              --package "$crate" --all-features -sss 2>&1); then
              echo "::warning::Failed to generate API diff for $crate"
              HAS_CHANGES=true
              printf '<details>\n<summary><code>%s</code> — ⚠️ build failed</summary>\n\n```\n%s\n```\n\n</details>\n\n' \
                "$crate" "$DIFF_OUTPUT" >> "$BODY_FILE"
              echo "::endgroup::"
              continue
            fi
            echo "::endgroup::"

            if [ -z "$DIFF_OUTPUT" ]; then
              continue
            fi

            HAS_CHANGES=true
            ADDED=$(echo "$DIFF_OUTPUT" | grep -c '^+' || true)
            REMOVED=$(echo "$DIFF_OUTPUT" | grep -c '^-' || true)
            CHANGED=$(echo "$DIFF_OUTPUT" | grep -c '^~' || true)
            SUMMARY_PARTS=""
            [ "$ADDED" -gt 0 ] && SUMMARY_PARTS="${ADDED} added"
            [ "$REMOVED" -gt 0 ] && SUMMARY_PARTS="${SUMMARY_PARTS:+${SUMMARY_PARTS}, }${REMOVED} removed"
            [ "$CHANGED" -gt 0 ] && SUMMARY_PARTS="${SUMMARY_PARTS:+${SUMMARY_PARTS}, }${CHANGED} changed"

            printf '<details>\n<summary><code>%s</code> — %s</summary>\n\n```\n%s\n```\n\n</details>\n\n' \
              "$crate" "$SUMMARY_PARTS" "$DIFF_OUTPUT" >> "$BODY_FILE"
          done

          if [ "$HAS_CHANGES" = "false" ]; then
            echo "No public API changes detected. Skipping comment."
            rm -f "$BODY_FILE"
            exit 0
          fi

          FULL_BODY_FILE=$(mktemp)
          {
            echo "$MARKER"
            echo "## Public API Changes"
            echo ""
            cat "$BODY_FILE"
            echo "---"
            echo '*Generated by cargo-public-api • `-sss` (simplified)*'
          } > "$FULL_BODY_FILE"
          rm -f "$BODY_FILE"

          EXISTING_ID=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .node_id" \
            | head -1)

          if [ -n "$EXISTING_ID" ]; then
            gh api graphql \
              -f id="$EXISTING_ID" \
              -F "body=@${FULL_BODY_FILE}" \
              -f query='
                mutation($id: ID!, $body: String!) {
                  updateIssueComment(input: {id: $id, body: $body}) {
                    issueComment { id }
                  }
                }'
            echo "Updated existing public API diff comment."
          else
            gh pr comment "$PR_NUMBER" --body-file "$FULL_BODY_FILE"
            echo "Created new public API diff comment."
          fi
          rm -f "$FULL_BODY_FILE"
