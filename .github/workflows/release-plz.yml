name: Release-plz

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Native two-step release workflow:
  # 1. Push to main -> release-plz creates Release PR (branch: release-plz-*)
  # 2. Merge Release PR -> release-plz detects commit from release-plz-* branch and creates GitHub Release
  #
  # IMPORTANT: pr_branch_prefix must remain "release-plz-" in release-plz.toml
  # to ensure this two-step detection works correctly.
  #
  # Note: nuages is not published to crates.io, so CARGO_REGISTRY_TOKEN is not needed.

  release-plz-pr:
    name: Release PR
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Generate GitHub token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        id: generate-token
        with:
          app-id: ${{ secrets.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Run release-plz release-pr
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

  release-plz-release:
    name: Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: release-plz-release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Generate GitHub token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        id: generate-token
        with:
          app-id: ${{ secrets.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      # Workaround for gix slotmap overflow (GitoxideLabs/gitoxide#1788)
      - name: Clear cargo registry git index cache
        run: rm -rf ~/.cargo/registry/index/github.com-*

      - name: Create GitHub Release (attempt 1/3)
        id: release-attempt-1
        continue-on-error: true
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Wait before retry (attempt 1)
        if: steps.release-attempt-1.outcome == 'failure'
        run: |
          echo "First release attempt failed. Waiting 120s before retry..."
          sleep 120

      - name: Clear registry index for retry (attempt 1)
        if: steps.release-attempt-1.outcome == 'failure'
        run: rm -rf ~/.cargo/registry/index/github.com-*

      - name: Create GitHub Release (attempt 2/3)
        id: release-attempt-2
        if: steps.release-attempt-1.outcome == 'failure'
        continue-on-error: true
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Wait before retry (attempt 2)
        if: steps.release-attempt-1.outcome == 'failure' && steps.release-attempt-2.outcome == 'failure'
        run: |
          echo "Second release attempt failed. Waiting 120s before retry..."
          sleep 120

      - name: Clear registry index for retry (attempt 2)
        if: steps.release-attempt-1.outcome == 'failure' && steps.release-attempt-2.outcome == 'failure'
        run: rm -rf ~/.cargo/registry/index/github.com-*

      - name: Create GitHub Release (attempt 3/3)
        if: steps.release-attempt-1.outcome == 'failure' && steps.release-attempt-2.outcome == 'failure'
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
