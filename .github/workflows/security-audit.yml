name: Security Audit

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label JSON. Use "\"ubuntu-latest\"" for GitHub-hosted or "[\"self-hosted\",\"linux\",\"arm64\",\"reinhardt-cloud-ci\"]" for self-hosted.'
        type: string
        default: '"ubuntu-latest"'
  workflow_dispatch:
  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'

env:
  CARGO_TERM_COLOR: always

jobs:
  security-audit:
    name: Scan for known vulnerabilities
    runs-on: ${{ fromJSON(inputs.runner || '"ubuntu-latest"') }}
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Install cargo-audit
        uses: taiki-e/install-action@de6bbd1333b8f331563d54a051e542c7dfef81c3 # v2
        with:
          tool: cargo-audit

      - name: Run cargo audit
        # Ignore upstream transitive dependency advisories from reinhardt-web.
        # See audit.toml for detailed reasoning per advisory.
        run: >-
          cargo audit
          --ignore RUSTSEC-2023-0071
          --ignore RUSTSEC-2023-0089
          --ignore RUSTSEC-2025-0141
          --ignore RUSTSEC-2021-0141
          --ignore RUSTSEC-2024-0436
          --ignore RUSTSEC-2025-0134
          --ignore RUSTSEC-2024-0320
          --ignore RUSTSEC-2024-0370
          --ignore RUSTSEC-2026-0044
          --ignore RUSTSEC-2026-0048
          --ignore RUSTSEC-2026-0049
          --ignore RUSTSEC-2026-0098
          --ignore RUSTSEC-2026-0099
          --ignore RUSTSEC-2026-0112
          --ignore RUSTSEC-2026-0113
