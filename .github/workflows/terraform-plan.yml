name: Terraform Plan

on:
  pull_request:
    paths:
      - "infra/repository/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: terraform-plan-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  plan:
    if: github.event.pull_request.head.repo.full_name == github.repository
    name: Plan (repository)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: infra/repository

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.10"

      - name: Check required variables
        env:
          TF_VAR_github_token: ${{ secrets.TF_GITHUB_TOKEN }}
        run: |
          if [ -z "$TF_VAR_github_token" ]; then
            echo "::warning::TF_GITHUB_TOKEN not configured — skipping plan"
            echo "SKIP_PLAN=true" >> "$GITHUB_ENV"
          fi

      - name: Terraform Init
        if: env.SKIP_PLAN != 'true'
        run: terraform init -input=false
        continue-on-error: true

      - name: Terraform Plan
        if: env.SKIP_PLAN != 'true'
        id: plan
        env:
          # TF_VAR_ mappings for infra/repository variables
          TF_VAR_github_owner: ${{ secrets.TF_GITHUB_OWNER }}
          TF_VAR_github_token: ${{ secrets.TF_GITHUB_TOKEN }}
          TF_VAR_environment_reviewer: ${{ secrets.TF_ENVIRONMENT_REVIEWER }}
          TF_VAR_release_plz_app_id: ${{ secrets.TF_RELEASE_PLZ_APP_ID }}
          TF_VAR_release_plz_app_private_key: ${{ secrets.TF_RELEASE_PLZ_APP_PRIVATE_KEY }}
          TF_VAR_dockerhub_username: ${{ secrets.TF_DOCKERHUB_USERNAME }}
          TF_VAR_dockerhub_token: ${{ secrets.TF_DOCKERHUB_TOKEN }}
          TF_VAR_codecov_token: ${{ secrets.TF_CODECOV_TOKEN }}
        run: |
          terraform plan -no-color -input=false 2>&1 | tee plan-output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Post plan to PR
        if: always() && github.event_name == 'pull_request' && env.SKIP_PLAN != 'true'
        uses: actions/github-script@v7
        env:
          PLAN_EXIT: ${{ steps.plan.outputs.exitcode }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- terraform-plan-repository -->';

            let planOutput = '';
            try {
              planOutput = fs.readFileSync('infra/repository/plan-output.txt', 'utf8');
            } catch {
              planOutput = 'Plan output not available.';
            }

            if (planOutput.length > 60000) {
              planOutput = planOutput.substring(0, 60000) + '\n\n... (truncated)';
            }

            const exitCode = process.env.PLAN_EXIT;
            const status = exitCode === '0' ? '✅ No changes' : exitCode === '2' ? '⚠️ Changes detected' : '❌ Error';

            const body = [
              marker,
              `### Terraform Plan: \`repository\` ${status}`,
              '',
              '<details>',
              '<summary>Show plan output</summary>',
              '',
              '```',
              planOutput,
              '```',
              '',
              '</details>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
