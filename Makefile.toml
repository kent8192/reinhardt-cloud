# Reinhardt Cloud - cargo-make configuration

[config]
default_to_workspace = false

# Environment variables
[env]
CARGO_TERM_COLOR = "always"
RUST_BACKTRACE = "1"

# ============================================================================
# Core Development Tasks
# ============================================================================

[tasks.check]
description = "Run cargo check on workspace"
command = "cargo"
args = [
	"check",
	"--locked",
	"--workspace",
	"--all-features",
	"--all-targets",
	"--quiet",
]

[tasks.build]
description = "Build workspace"
command = "cargo"
args = [
	"build",
	"--locked",
	"--workspace",
	"--all-features",
	"--all-targets",
	"--quiet",
]

[tasks.build-release]
description = "Build workspace in release mode"
command = "cargo"
args = [
	"build",
	"--locked",
	"--workspace",
	"--all-features",
	"--release",
	"--quiet",
]

[tasks.clean]
description = "Clean build artifacts"
command = "cargo"
args = ["clean"]

# ============================================================================
# Code Quality Tasks
# ============================================================================

[tasks.fmt-check]
description = "Check all code formatting (Rust + page! DSL)"
command = "reinhardt-admin"
args = ["fmt-all", "--check"]

[tasks.fmt-fix]
description = "Auto-fix all code formatting (Rust + page! DSL)"
command = "reinhardt-admin"
args = ["fmt-all"]

[tasks.clippy-check]
description = "Run clippy linter"
command = "cargo"
args = [
	"clippy",
	"--locked",
	"--workspace",
	"--all",
	"--all-features",
	"--",
	"-D",
	"warnings",
]

[tasks.clippy-fix]
description = "Run clippy linter and automatically fix found errors"
command = "cargo"
args = [
	"clippy",
	"--fix",
	"--locked",
	"--workspace",
	"--all",
	"--all-features",
	"--allow-dirty",
	"--",
	"-D",
	"warnings",
]

[tasks.clippy-todo-check]
description = "Check for development-only code (todo!, unimplemented!, dbg!)"
command = "cargo"
args = [
	"clippy",
	"--locked",
	"--workspace",
	"--all",
	"--all-features",
	"--",
	"-D", "clippy::todo",
	"-D", "clippy::unimplemented",
	"-D", "clippy::dbg_macro",
]

# ============================================================================
# Testing Tasks
# ============================================================================

[tasks.test]
description = "Run all tests with nextest"
command = "cargo"
args = [
	"nextest",
	"run",
	"--locked",
	"--workspace",
	"--all-features",
	"--no-fail-fast",
]

[tasks.test-unit]
description = "Run unit tests only"
command = "cargo"
args = [
	"nextest",
	"run",
	"--locked",
	"--workspace",
	"--lib",
	"--all-features",
	"--no-fail-fast",
]

[tasks.doc-test]
description = "Run documentation tests"
command = "cargo"
args = ["test", "--locked", "--workspace", "--all-features", "--doc"]

# ============================================================================
# Documentation Tasks
# ============================================================================

[tasks.doc]
description = "Build documentation"
command = "cargo"
args = ["doc", "--locked", "--workspace", "--all-features", "--no-deps"]

[tasks.doc-open]
description = "Build and open documentation"
command = "cargo"
args = [
	"doc",
	"--locked",
	"--workspace",
	"--all-features",
	"--no-deps",
	"--open",
]

# ============================================================================
# Security Tasks
# ============================================================================

[tasks.audit]
description = "Check for known vulnerabilities in dependencies"
command = "cargo"
args = [
	"audit",
	# Ignore upstream transitive dependency advisories from reinhardt-web.
	# See audit.toml for detailed reasoning per advisory.
	"--ignore", "RUSTSEC-2023-0071",
	"--ignore", "RUSTSEC-2023-0089",
	"--ignore", "RUSTSEC-2025-0141",
	"--ignore", "RUSTSEC-2021-0141",
	"--ignore", "RUSTSEC-2024-0436",
	"--ignore", "RUSTSEC-2025-0134",
	"--ignore", "RUSTSEC-2024-0320",
	"--ignore", "RUSTSEC-2024-0370",
	"--ignore", "RUSTSEC-2026-0048",
	"--ignore", "RUSTSEC-2026-0044",
	"--ignore", "RUSTSEC-2026-0049",
	"--ignore", "RUSTSEC-2026-0098",
	"--ignore", "RUSTSEC-2026-0099",
	"--ignore", "RUSTSEC-2026-0112",
	"--ignore", "RUSTSEC-2026-0113",
]

# ============================================================================
# Development Server Tasks
# ============================================================================

[tasks.runserver]
description = "Start local development server with WASM frontend (auto-starts ephemeral PostgreSQL/Redis via docker; Docker required)"
cwd = "dashboard"
dependencies = ["infra-up", "migrate", "collectstatic"]
command = "cargo"
args = [
	"run",
	"--locked",
	"--bin",
	"manage",
	"--",
	"runserver",
	"--with-pages",
	"--insecure",
	"--static-dir",
	"dist",
	"--index",
	"index.html",
]
env = { REINHARDT_ENV = "local" }

[tasks.showurls]
description = "Display all registered URL patterns"
cwd = "dashboard"
command = "cargo"
args = ["run", "--locked", "--bin", "manage", "--", "showurls"]
env = { REINHARDT_ENV = "local" }

[tasks.migrate]
description = "Apply database migrations"
cwd = "dashboard"
command = "cargo"
args = ["run", "--locked", "--bin", "manage", "--", "migrate"]
env = { REINHARDT_ENV = "local" }

[tasks.collectstatic]
description = "Collect static files into STATIC_ROOT"
cwd = "dashboard"
command = "cargo"
args = ["run", "--locked", "--bin", "manage", "--", "collectstatic", "--no-input"]
env = { REINHARDT_ENV = "local" }

# ============================================================================
# Ephemeral Local Infrastructure (postgres / redis via docker run --rm)
# ============================================================================
#
# Spins up disposable PostgreSQL + Redis containers for local development.
# Containers are launched with `docker run --rm` and no persistent volumes,
# so all data is wiped when the containers stop. Connection parameters
# (user / password / database / port / redis URL) are parsed from
# `dashboard/settings/<profile>.toml` (matching `REINHARDT_ENV`), so
# changes to that file are picked up on the next `cargo make infra-up`
# without editing this Makefile.
#
# Implementation: dashboard/scripts/infra_up.sh and infra_down.sh.

# Pin REINHARDT_ENV on infra-up/infra-down so the profile parsed by
# infra_up.sh matches the one used by the rest of the runserver chain
# (migrate, collectstatic, runserver all force "local"). Without this, a
# stray REINHARDT_ENV in the user's shell would route infra-up to a
# different settings/<profile>.toml than the dashboard process, producing
# an auth/port mismatch at first query. Override by invoking the script
# directly: `bash dashboard/scripts/infra_up.sh` with REINHARDT_ENV set.
[tasks.infra-up]
description = "Start disposable PostgreSQL + Redis containers (docker run --rm); credentials parsed from settings/<profile>.toml"
cwd = "dashboard"
command = "bash"
args = ["scripts/infra_up.sh"]
env = { REINHARDT_ENV = "local" }

[tasks.infra-down]
description = "Stop disposable PostgreSQL + Redis containers (data is wiped)"
cwd = "dashboard"
command = "bash"
args = ["scripts/infra_down.sh"]
env = { REINHARDT_ENV = "local" }

[tasks.infra-reset]
description = "Stop and recreate disposable infrastructure (wipes all data)"
dependencies = ["infra-down", "infra-up"]

# ============================================================================
# CRD Generation Tasks
# ============================================================================

[tasks.generate-crd]
description = "Generate ReinhardtApp CRD YAML into Helm chart crds/ directory"
command = "cargo"
args = [
	"run",
	"--locked",
	"--bin",
	"reinhardt-cloud",
	"--quiet",
	"--",
	"crd",
	"generate",
	"--output",
	"charts/reinhardt-cloud-operator/crds/reinhardtapp-crd.yaml",
]

# ============================================================================
# Combined Checks (run before PR)
# ============================================================================

[tasks.pre-pr]
description = "Run all checks before creating a PR"
dependencies = [
	"fmt-check",
	"clippy-check",
	"test",
	"doc",
]

[tasks.test-logging]
description = "Runs the reinhardt-cloud-telemetry crate tests plus any integration-level log tests."
env = { RUST_LOG = "reinhardt_cloud_telemetry=debug" }
command = "cargo"
args = [
	"nextest",
	"run",
	"--locked",
	"-p",
	"reinhardt-cloud-telemetry",
	"--all-features",
]
# Expand to spin up Loki via TestContainers once the LokiLogService read path
# is finalized; see the Loki stub in crates/reinhardt-cloud-telemetry/src/log_service/loki.rs.
