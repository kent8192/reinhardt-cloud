{{- if and .Values.isolation.runtimeClasses.gvisor.enabled (ne .Values.platform "gcp") }}
# GKE manages gVisor RuntimeClass natively; this template is skipped on GCP.
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: gvisor
  labels:
    {{- include "nuages-operator.labels" . | nindent 4 }}
handler: runsc
scheduling:
  nodeSelector:
    nuages.dev/runtime-gvisor: "true"
{{- end }}
