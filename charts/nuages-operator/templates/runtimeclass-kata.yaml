{{- if .Values.isolation.runtimeClasses.kata.enabled }}
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: kata-clh
  labels:
    {{- include "nuages-operator.labels" . | nindent 4 }}
handler: {{ .Values.isolation.runtimeClasses.kata.handler }}
scheduling:
  nodeSelector:
    nuages.dev/runtime-kata: "true"
overhead:
  podFixed:
    memory: {{ .Values.isolation.runtimeClasses.kata.overhead.memory | quote }}
    cpu: {{ .Values.isolation.runtimeClasses.kata.overhead.cpu | quote }}
{{- end }}
