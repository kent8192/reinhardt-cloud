platform: gcp

image:
  repository: <region>-docker.pkg.dev/<project-id>/nuages/nuages-operator

serviceAccount:
  annotations:
    iam.gke.io/gcp-service-account: "nuages-operator@<project-id>.iam.gserviceaccount.com"

nodeSelector:
  kubernetes.io/os: linux
  kubernetes.io/arch: amd64

defaults:
  database:
    instance_class: db-f1-micro
    storage_gb: 10
    availability: ZONAL
    engine_version:
      postgresql: POSTGRES_16
      mysql: MYSQL_8_0
  cache:
    tier: BASIC
    memory_size_gb: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  storage:
    class: standard-rwo
  ingress:
    class: gce
    annotations:
      kubernetes.io/ingress.class: gce

isolation:
  defaultLevel: "Sandbox"
  runtimeClasses:
    kata:
      enabled: true
    gvisor:
      enabled: false  # GKE manages gVisor RuntimeClass natively
  networkPolicy:
    enabled: true
    provider: cilium
    blockMetadataService: true
