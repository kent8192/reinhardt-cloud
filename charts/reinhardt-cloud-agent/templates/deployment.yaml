apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "reinhardt-cloud-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reinhardt-cloud-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "reinhardt-cloud-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "reinhardt-cloud-agent.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "reinhardt-cloud-agent.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: agent
          image: {{ include "reinhardt-cloud-agent.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: CONTROL_PLANE_URL
              value: {{ required "controlPlane.url is required" .Values.controlPlane.url | quote }}
            - name: CLUSTER_NAME
              value: {{ required "controlPlane.clusterName is required" .Values.controlPlane.clusterName | quote }}
            - name: AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "reinhardt-cloud-agent.authSecretName" . }}
                  key: {{ .Values.auth.secretKey | quote }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
