{{- if .Values.auth.createSecret -}}
# WARNING: Dev-only path. Chart-managed Secret stores the token in Helm
# release values, which are retrievable via `helm get values`. For
# production, leave auth.createSecret false and provision the Secret
# out-of-band (sealed-secrets, external-secrets, etc.), then set
# auth.existingSecret to its name.
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-auth" (include "reinhardt-cloud-agent.fullname" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reinhardt-cloud-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.auth.secretKey }}: {{ required "auth.token is required when auth.createSecret is true" .Values.auth.token | quote }}
{{- end }}
