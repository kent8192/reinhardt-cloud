apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "reinhardt-cloud-operator.fullname" . }}
  labels:
    {{- include "reinhardt-cloud-operator.labels" . | nindent 4 }}
rules:
  # Base: CRD management (always required)
  - apiGroups: ["paas.reinhardt-cloud.dev"]
    resources: ["projects"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["paas.reinhardt-cloud.dev"]
    resources: ["projects/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["paas.reinhardt-cloud.dev"]
    resources: ["projects/finalizers"]
    verbs: ["update"]
  # Base: Deployment management (always required)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Base: Service, ConfigMap, Secret management (always required)
  - apiGroups: [""]
    resources: ["services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Base: ServiceAccount management — used for the storage IAM KSA
  # ({name}-storage) and the per-app workload identity KSA ({name}-app)
  # that carries Workload Identity / IRSA bindings.
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Base: Event creation (always required)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Database feature: on-premise StatefulSet and PVC management
  {{- if .Values.features.database }}
  {{- if eq .Values.platform "onpremise" }}
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  {{- end }}
  # Database feature: AWS RDS via ACK
  {{- if eq .Values.platform "aws" }}
  - apiGroups: ["rds.services.k8s.aws"]
    resources: ["dbinstances"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  {{- end }}
  # Database feature: GCP Cloud SQL via Config Connector
  {{- if eq .Values.platform "gcp" }}
  - apiGroups: ["sql.cnrm.cloud.google.com"]
    resources: ["sqlinstances", "sqldatabases", "sqlusers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  {{- end }}
  {{- end }}
  # Cache feature: on-premise StatefulSet management
  {{- if .Values.features.cache }}
  {{- if eq .Values.platform "onpremise" }}
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  {{- end }}
  # Cache feature: AWS ElastiCache via ACK
  {{- if eq .Values.platform "aws" }}
  - apiGroups: ["elasticache.services.k8s.aws"]
    resources: ["replicationgroups"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  {{- end }}
  # Cache feature: GCP Memorystore via Config Connector
  {{- if eq .Values.platform "gcp" }}
  - apiGroups: ["redis.cnrm.cloud.google.com"]
    resources: ["redisinstances"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  {{- end }}
  {{- end }}
  # Ingress feature: Ingress resource management
  {{- if .Values.features.ingress }}
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  {{- end }}
  # Autoscaling feature: HPA management
  {{- if .Values.features.autoscaling }}
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  {{- end }}
  # --- Workload Isolation (security resources) ---
  # NetworkPolicy management for tenant isolation. Used both by the
  # per-app isolation reconciler (spec.isolation) and by the tenant
  # reconciler (#416) which lays down the per-tenant default-deny +
  # selective-allow triple.
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # LimitRange and ResourceQuota management for noisy neighbor protection.
  # ResourceQuota is also used by the tenant reconciler (#416) to apply a
  # per-tenant default quota in each tenant namespace.
  - apiGroups: [""]
    resources: ["limitranges", "resourcequotas"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Namespace management for tenant isolation (#416).
  # - get/list/watch: detect existing tenant namespaces and label state
  # - create: initially provision the per-tenant namespace
  # - update/patch: keep tenant labels in sync (and Pod Security Standards
  #   labels written by the per-app `reconcile_pss_labels` path)
  # delete is intentionally OMITTED — namespaces are shared across CRs in
  # the tenant, and a tenant-scoped controller (future issue) will own
  # cleanup once the namespace is empty.
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
