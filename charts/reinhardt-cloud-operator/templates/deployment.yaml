apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "reinhardt-cloud-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reinhardt-cloud-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "reinhardt-cloud-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "reinhardt-cloud-operator.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "reinhardt-cloud-operator.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: operator
          image: {{ include "reinhardt-cloud-operator.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            {{- toYaml .Values.operator.args | nindent 12 }}
          env:
            - name: REINHARDT_CLOUD_PLATFORM
              value: {{ .Values.platform | quote }}
            # Always bind the always-on HTTP server (healthz + optional
            # metrics) to `.Values.metrics.port` so the containerPort and
            # probe targets stay consistent even when metrics scraping is
            # disabled. `REINHARDT_CLOUD_METRICS_ENABLED` remains gated by
            # `.Values.metrics.enabled` so `/metrics` is only exposed when
            # the operator opts in.
            - name: REINHARDT_CLOUD_METRICS_ADDR
              value: {{ printf "0.0.0.0:%d" (int .Values.metrics.port) | quote }}
            {{- if .Values.metrics.enabled }}
            - name: REINHARDT_CLOUD_METRICS_ENABLED
              value: "true"
            {{- end }}
            - name: REINHARDT_LOG_FORMAT
              value: {{ .Values.logging.format | quote }}
            {{- range $key, $value := .Values.operator.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $key, $value := .Values.operator.extraEnv }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.tracing.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.tracing.endpoint | quote }}
            - name: OTEL_TRACES_SAMPLER
              value: {{ .Values.tracing.sampler | quote }}
            {{- if .Values.tracing.samplerArg }}
            - name: OTEL_TRACES_SAMPLER_ARG
              value: {{ .Values.tracing.samplerArg | quote }}
            {{- end }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.tracing.serviceName | default .Release.Name | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
