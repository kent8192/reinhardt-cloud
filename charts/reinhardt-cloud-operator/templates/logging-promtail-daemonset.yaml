{{- if .Values.logging.loki.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "reinhardt-cloud-operator.fullname" . }}-promtail
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reinhardt-cloud-operator.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "reinhardt-cloud-operator.name" . }}-promtail
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "reinhardt-cloud-operator.name" . }}-promtail
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "reinhardt-cloud-operator.fullname" . }}-promtail
      containers:
        - name: promtail
          image: {{ .Values.logging.loki.promtailImage }}
          args:
            - "-config.file=/etc/promtail/promtail.yaml"
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: run
              mountPath: /run/promtail
            - name: pods
              mountPath: /var/log/pods
              readOnly: true
            - name: containers
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources:
            {{- toYaml .Values.logging.loki.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "reinhardt-cloud-operator.fullname" . }}-promtail
        - name: run
          emptyDir: {}
        - name: pods
          hostPath:
            path: /var/log/pods
        - name: containers
          hostPath:
            path: /var/lib/docker/containers
{{- end }}
