# AWS overlay: selects AWS PlatformConfig and RBAC rules on top of values.yaml.
platform: aws

image:
  repository: <account-id>.dkr.ecr.<region>.amazonaws.com/reinhardt-cloud-operator

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::<account-id>:role/reinhardt-cloud-operator"

nodeSelector:
  kubernetes.io/os: linux
  kubernetes.io/arch: amd64

defaults:
  database:
    # RDS instance class for provisioned databases (AWS-specific).
    instance_class: db.t3.micro
    # Default storage size in GiB; matches values.yaml baseline.
    storage_gb: 20
    multi_az: false
    engine_version:
      postgresql: "16.3"
      mysql: "8.0"
  cache:
    node_type: cache.t3.micro
    num_nodes: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  storage:
    # AWS EBS gp3 StorageClass (overrides the on-prem local-path default).
    class: gp3
  ingress:
    # AWS Load Balancer Controller ALB IngressClass (overrides nginx).
    class: alb
    annotations:
      kubernetes.io/ingress.class: alb
      alb.ingress.kubernetes.io/scheme: internet-facing

isolation:
  # Stronger default than values.yaml: AWS EKS supports sandbox runtimes.
  defaultLevel: "Sandbox"
  runtimeClasses:
    kata:
      enabled: true
    gvisor:
      enabled: true
  networkPolicy:
    enabled: true
    provider: cilium
    blockMetadataService: true
