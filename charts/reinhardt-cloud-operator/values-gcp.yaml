# GCP overlay: selects GCP PlatformConfig and RBAC rules on top of values.yaml.
platform: gcp

image:
  repository: <region>-docker.pkg.dev/<project-id>/reinhardt-cloud/reinhardt-cloud-operator

serviceAccount:
  annotations:
    iam.gke.io/gcp-service-account: "reinhardt-cloud-operator@<project-id>.iam.gserviceaccount.com"

nodeSelector:
  kubernetes.io/os: linux
  kubernetes.io/arch: amd64

defaults:
  database:
    # Cloud SQL instance tier for provisioned databases (GCP-specific).
    instance_class: db-f1-micro
    # Smaller default than values.yaml baseline; GCP minimum billable disk is 10 GiB.
    storage_gb: 10
    availability: ZONAL
    engine_version:
      postgresql: POSTGRES_16
      mysql: MYSQL_8_0
  cache:
    tier: BASIC
    memory_size_gb: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  storage:
    # GKE default ReadWriteOnce StorageClass (overrides local-path).
    class: standard-rwo
  ingress:
    # GCE L7 load balancer IngressClass (overrides nginx).
    class: gce
    annotations:
      # Project-level TLS is configured through spec.services.tls; these
      # annotations remain provider-specific Ingress controller defaults.
      kubernetes.io/ingress.class: gce

isolation:
  # Stronger default than values.yaml: GKE supports sandbox runtimes natively.
  defaultLevel: "Sandbox"
  runtimeClasses:
    kata:
      enabled: true
    gvisor:
      enabled: false  # GKE manages gVisor RuntimeClass natively
  networkPolicy:
    enabled: true
    provider: cilium
    blockMetadataService: true
