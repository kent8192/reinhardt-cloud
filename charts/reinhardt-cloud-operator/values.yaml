replicaCount: 1

image:
  repository: reinhardt-cloud-operator
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

namespace: reinhardt-cloud-system

# Target platform driving PlatformConfig and RBAC rules (onpremise | aws | gcp).
platform: onpremise

features:
  # Enable database inference and RBAC for managed database resources.
  database: true
  # Enable cache (Redis) inference and reconciliation.
  cache: false
  # Enable ingress resource inference and reconciliation.
  ingress: false
  # Enable horizontal autoscaling (HPA) support.
  autoscaling: false
  # Enable persistent storage (PVC) inference and reconciliation.
  storage: false
  # Enable background worker (Deployment) inference and reconciliation.
  worker: false

serviceAccount:
  create: true
  annotations: {}
  name: ""

operator:
  # Command-line arguments passed to the operator binary entrypoint.
  args:
    - run
  env:
    RUST_LOG: info
  extraEnv: {}

logging:
  # Output format for operator logs. "text" (default) is human-readable;
  # "json" emits one structured JSON object per line for log aggregators.
  format: text
  loki:
    # When true, deploys a Promtail DaemonSet that tails operator pods and
    # forwards logs to the configured Loki endpoint.
    enabled: false
    endpoint: "http://loki.monitoring.svc.cluster.local:3100"
    promtailImage: "grafana/promtail:2.9.0"
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    # Promtail requires read access to /var/log/pods on the host node.
    # On most distributions this requires running as root (uid 0).
    # Override this when your cluster enforces non-root Pod Security Standards
    # and the node log directory is readable by a non-root group.
    podSecurityContext:
      runAsUser: 0
      runAsGroup: 0

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

metrics:
  # Enable the Prometheus /metrics endpoint exposed by the operator.
  enabled: false
  # Port on which the operator serves /metrics. The operator container
  # always listens on this port when metrics are enabled.
  port: 9090
  service:
    type: ClusterIP
    annotations: {}
  serviceMonitor:
    # Requires the Prometheus Operator CRDs to be installed.
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

nodeSelector: {}
tolerations: []
affinity: {}

defaults:
  database:
    # Default persistent storage size for managed databases, in GiB.
    storage_gb: 20
    storage_class: local-path
    engine_version:
      # Default PostgreSQL version used when a tenant does not override it; use
      # the format expected by the selected platform/overlay (for example, on-prem
      # uses a major version like "16", AWS uses a minor version like "16.3", and
      # GCP requires an engine identifier such as POSTGRES_16).
      postgresql: "16"
      # Default MySQL version used when a tenant does not override it; use the
      # format expected by the selected platform/overlay (for example, on-prem
      # uses "8.0", AWS may require a specific minor version, and GCP may require
      # a provider-specific engine identifier).
      mysql: "8.0"
  cache:
    storage_gb: 1
    storage_class: local-path
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  storage:
    class: local-path
  ingress:
    # Default IngressClass name used when a tenant does not override it.
    class: nginx
    annotations:
      kubernetes.io/ingress.class: nginx

isolation:
  # Default tenant isolation level (None | Sandbox | MicroVM).
  defaultLevel: "None"
  runtimeClasses:
    kata:
      enabled: false
      handler: kata-clh
      overhead:
        memory: "160Mi"
        cpu: "250m"
    gvisor:
      enabled: false
  networkPolicy:
    # Enable generation of NetworkPolicy resources per tenant.
    enabled: true
    # CNI provider used to enforce NetworkPolicy (cilium | calico).
    provider: cilium
    # Block tenant pod access to cloud metadata services (169.254.169.254).
    blockMetadataService: true
    # Default egress CIDRs allowed when no explicit policy is provided.
    defaultEgressAllow:
      - "0.0.0.0/0"
  podSecurityStandards:
    enabled: true
    # Pod Security Standard level enforced on tenant namespaces (privileged | baseline | restricted).
    enforceLevel: restricted
  seccomp:
    enabled: true
    profile: RuntimeDefault
  resourceLimits:
    enabled: true
    defaults:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: "2"
        memory: 2Gi
    # Hard upper bounds a tenant workload may request for CPU and memory.
    max:
      cpu: "4"
      memory: 4Gi

tracing:
  # Enable OTLP trace export from the operator.
  enabled: false
  # OTLP gRPC endpoint receiving spans.
  endpoint: "http://otel-collector.monitoring.svc.cluster.local:4317"
  # OTel sampler kind. Maps directly to OTEL_TRACES_SAMPLER. See OTel spec for valid values.
  sampler: "parentbased_traceidratio"
  # OTel sampler argument. Maps to OTEL_TRACES_SAMPLER_ARG when non-empty.
  # For parentbased_traceidratio this is the head-sampling ratio (0.0–1.0).
  samplerArg: "0.1"
  # Service name reported in spans. Defaults to "reinhardt-cloud-operator".
  serviceName: "reinhardt-cloud-operator"
