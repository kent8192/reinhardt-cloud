replicaCount: 1

image:
  repository: reinhardt-cloud-operator
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

namespace: reinhardt-cloud-system

# Target platform driving PlatformConfig and RBAC rules (onpremise | aws | gcp).
platform: onpremise

features:
  # Enable database inference and RBAC for managed database resources.
  database: true
  # Enable cache (Redis) inference and reconciliation.
  cache: false
  # Enable ingress resource inference and reconciliation.
  ingress: false
  # Enable horizontal autoscaling (HPA / KEDA ScaledObject) support.
  autoscaling: false
  # Enable persistent storage (PVC) inference and reconciliation.
  storage: false
  # Enable background worker (Job / CronJob) inference and reconciliation.
  worker: false

serviceAccount:
  create: true
  annotations: {}
  name: ""

operator:
  # Command-line arguments passed to the operator binary entrypoint.
  args:
    - run
  env:
    RUST_LOG: info
  extraEnv: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

defaults:
  database:
    # Default persistent storage size for managed databases, in GiB.
    storage_gb: 20
    storage_class: local-path
    engine_version:
      # Default PostgreSQL major version used when a tenant does not override it.
      postgresql: "16"
      # Default MySQL version used when a tenant does not override it.
      mysql: "8.0"
  cache:
    storage_gb: 1
    storage_class: local-path
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  storage:
    class: local-path
  ingress:
    # Default IngressClass name used when a tenant does not override it.
    class: nginx
    annotations:
      kubernetes.io/ingress.class: nginx

isolation:
  # Default tenant isolation level (None | Sandbox | Strict).
  defaultLevel: "None"
  runtimeClasses:
    kata:
      enabled: false
      handler: kata-clh
      overhead:
        memory: "160Mi"
        cpu: "250m"
    gvisor:
      enabled: false
  networkPolicy:
    # Enable generation of NetworkPolicy resources per tenant.
    enabled: true
    # CNI provider used to enforce NetworkPolicy (cilium | calico).
    provider: cilium
    # Block tenant pod access to cloud metadata services (169.254.169.254).
    blockMetadataService: true
    # Default egress CIDRs allowed when no explicit policy is provided.
    defaultEgressAllow:
      - "0.0.0.0/0"
  podSecurityStandards:
    enabled: true
    # Pod Security Standard level enforced on tenant namespaces (privileged | baseline | restricted).
    enforceLevel: restricted
  seccomp:
    enabled: true
    profile: RuntimeDefault
  resourceLimits:
    enabled: true
    defaults:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: "2"
        memory: 2Gi
    # Hard upper bounds a tenant workload may request for CPU and memory.
    max:
      cpu: "4"
      memory: 4Gi
