replicaCount: 1

image:
  repository: reinhardt-cloud-operator
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

namespace: reinhardt-cloud-system

platform: onpremise

features:
  database: true
  cache: false
  ingress: false
  autoscaling: false
  storage: false
  worker: false

serviceAccount:
  create: true
  annotations: {}
  name: ""

operator:
  args:
    - run
  env:
    RUST_LOG: info
  extraEnv: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

metrics:
  # Enable the Prometheus /metrics endpoint exposed by the operator.
  enabled: false
  # Port on which the operator serves /metrics. The operator container
  # always listens on this port when metrics are enabled.
  port: 9090
  service:
    type: ClusterIP
    annotations: {}
  serviceMonitor:
    # Requires the Prometheus Operator CRDs to be installed.
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

nodeSelector: {}
tolerations: []
affinity: {}

defaults:
  database:
    storage_gb: 20
    storage_class: local-path
    engine_version:
      postgresql: "16"
      mysql: "8.0"
  cache:
    storage_gb: 1
    storage_class: local-path
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  storage:
    class: local-path
  ingress:
    class: nginx
    annotations:
      kubernetes.io/ingress.class: nginx

isolation:
  defaultLevel: "None"
  runtimeClasses:
    kata:
      enabled: false
      handler: kata-clh
      overhead:
        memory: "160Mi"
        cpu: "250m"
    gvisor:
      enabled: false
  networkPolicy:
    enabled: true
    provider: cilium
    blockMetadataService: true
    defaultEgressAllow:
      - "0.0.0.0/0"
  podSecurityStandards:
    enabled: true
    enforceLevel: restricted
  seccomp:
    enabled: true
    profile: RuntimeDefault
  resourceLimits:
    enabled: true
    defaults:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: "2"
        memory: 2Gi
    max:
      cpu: "4"
      memory: 4Gi
