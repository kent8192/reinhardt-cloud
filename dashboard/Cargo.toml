[package]
name = "reinhardt-cloud-dashboard"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "reinhardt_cloud_dashboard"
path = "src/lib.rs"
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "manage"
path = "src/bin/manage.rs"

[features]
# Enables the client-side URL accessor `urls.client().<app>().<route>()`
# generated by `#[routes]`. Required for SPA `href` resolution via
# `ResolvedUrls::from_global()` in dashboard pages and layouts.
default = ["client-router"]
client-router = ["reinhardt/client-router"]
# Opts the `tests/wasm/` browser tests into the build. Off by default so
# `cargo nextest run` (host-target) does not try to compile WASM-only
# tests. Driven by `cargo make wasm-spa-test`. Refs #574.
wasm-spa-test = []

[dependencies]
reinhardt = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }

# Server-side: full reinhardt with server, database, auth, admin, etc.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
reinhardt = { workspace = true }
# Direct dependency on reinhardt-auth so we can enable the `social` feature,
# which is not exposed through the reinhardt meta-crate's auth-* features.
reinhardt-auth = { package = "reinhardt-auth", git = "https://github.com/kent8192/reinhardt-web", branch = "main", features = ["social"] }
reinhardt-cloud-types = { workspace = true }
reinhardt-cloud-core = { workspace = true }
reinhardt-cloud-k8s = { workspace = true }
reinhardt-cloud-proto = { workspace = true }
reinhardt-cloud-grpc = { workspace = true }
prost-types = { workspace = true }
tokio = { workspace = true }
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"
subtle = "2"
url = "2"
percent-encoding = "2"
tonic = "0.13"
tonic-health = "0.13"
tonic-reflection = "0.13"
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
ctor = "0.6"
inventory = "0.3"
async-trait = "0.1"
rand = { workspace = true }
lettre = { version = "0.11", default-features = false, features = ["builder", "smtp-transport", "tokio1-rustls-tls", "hostname"] }
rstest = { workspace = true }

# WASM client: reinhardt with pages features only
[target.'cfg(target_arch = "wasm32")'.dependencies]
reinhardt = { workspace = true, features = ["pages", "admin"] }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["Window", "Document", "Element", "HtmlElement", "Event", "History", "Location", "Storage", "WebSocket", "MessageEvent", "ErrorEvent", "CloseEvent"] }
js-sys = "0.3"
gloo-timers = "0.3"
console_error_panic_hook = "0.1"

# WASM-target dev-deps for browser tests. Driver: `wasm-pack test
# --headless --chrome --features wasm-spa-test`. Refs #574.
#
# `rstest` is required because `wasm-pack test` builds the lib (with
# `#[cfg(test)]` modules) alongside the integration test, and several
# lib modules (e.g. `apps/deployments/client/components/log_viewer.rs`)
# already use `rstest` for native unit tests. Without `rstest` in the
# wasm dev-dep set, `cargo build --tests --target wasm32-unknown-unknown`
# fails to find the `#[case]` and `#[rstest]` attributes.
[target.'cfg(target_arch = "wasm32")'.dev-dependencies]
wasm-bindgen-test = "0.3"
rstest = { workspace = true }

[build-dependencies]
cfg_aliases = "0.2"

# Native dev-deps. Pulled into a target-gated block so the WASM browser
# tests under `tests/wasm/` (driven by `wasm-pack test --headless
# --chrome`) do not transitively compile `tokio`/`mio`/`reqwest`/
# `wiremock`, which fail to link for `wasm32-unknown-unknown`. Refs #574.
[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
rstest = { workspace = true }
serial_test = "3.2"
anyhow = { workspace = true }
proptest = "1.4"
reqwest = { workspace = true }
wiremock = "0.6"

[lints]
workspace = true
