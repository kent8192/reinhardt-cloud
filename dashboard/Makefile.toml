# Makefile.toml for Reinhardt Project
#
# This file provides cargo-make task definitions for common development operations.
# Install cargo-make: `cargo install cargo-make`
# Usage: `cargo make <task>`

[config]
default_to_workspace = false
skip_core_tasks = true

# ============================================================================
# Development Server
# ============================================================================

[tasks.runserver]
description = "Start the development server"
command = "cargo"
args = ["run", "--bin", "manage", "runserver"]

[tasks.runserver-watch]
description = "Start the development server with auto-reload (requires bacon)"
command = "bacon"
args = ["runserver"]

# ============================================================================
# Database Migrations
# ============================================================================

[tasks.makemigrations]
description = "Create new migrations based on model changes"
command = "cargo"
args = ["run", "--bin", "manage", "makemigrations"]

[tasks.makemigrations-app]
description = "Create new migrations for a specific app (usage: cargo make makemigrations-app -- <app_label>)"
command = "cargo"
args = ["run", "--bin", "manage", "makemigrations", "${@}"]

# ============================================================================
# Static Files
# ============================================================================

[tasks.collectstatic]
description = "Collect static files into STATIC_ROOT"
command = "cargo"
args = ["run", "--bin", "manage", "collectstatic"]

# ============================================================================
# Project Management
# ============================================================================

[tasks.check]
description = "Check the project for common issues"
command = "cargo"
args = ["run", "--bin", "manage", "check"]

[tasks.shell]
description = "Run an interactive Rust shell (REPL)"
command = "cargo"
args = ["run", "--bin", "manage", "shell"]

# ============================================================================
# Testing
# ============================================================================

[tasks.test]
description = "Run all dashboard tests, including WASM browser E2E"
dependencies = ["test-native", "wasm-spa-test"]

[tasks.test-native]
description = "Run native dashboard tests"
command = "cargo"
args = ["nextest", "run", "--all-features"]

[tasks.test-unit]
description = "Run unit tests only"
command = "cargo"
args = ["nextest", "run", "--lib", "--all-features"]

[tasks.test-integration]
description = "Run integration tests only"
command = "cargo"
args = ["nextest", "run", "--test", "*", "--all-features"]

[tasks.test-watch]
description = "Run tests with auto-reload (requires bacon)"
command = "bacon"
args = ["test"]

# ============================================================================
# Code Quality
# ============================================================================

[tasks.fmt-check]
description = "Check code formatting (rustfmt + page! DSL)"
command = "reinhardt-admin"
args = ["fmt", ".", "--check"]

[tasks.fmt-fix]
description = "Fix code formatting (rustfmt + page! DSL)"
command = "reinhardt-admin"
args = ["fmt", "."]

[tasks.clippy-check]
description = "Check linting rules"
command = "cargo"
args = ["clippy", "--all-features", "--", "-D", "warnings"]

[tasks.clippy-fix]
description = "Fix linting issues automatically"
command = "cargo"
args = ["clippy", "--all-features", "--fix", "--allow-dirty", "--allow-staged"]

[tasks.quality]
description = "Run all code quality checks (format + lint)"
dependencies = ["fmt-check", "clippy-check"]

[tasks.quality-fix]
description = "Fix all code quality issues automatically"
dependencies = ["fmt-fix", "clippy-fix"]

# ============================================================================
# Build & Clean
# ============================================================================

[tasks.build]
description = "Build the project in debug mode"
command = "cargo"
args = ["build", "--all-features"]

[tasks.build-release]
description = "Build the project in release mode"
command = "cargo"
args = ["build", "--release", "--all-features"]

[tasks.clean]
description = "Clean build artifacts"
command = "cargo"
args = ["clean"]

# ============================================================================
# Development Workflow
# ============================================================================

[tasks.dev]
description = "Start development environment (checks, builds, runs server)"
dependencies = ["quality", "build", "runserver"]

[tasks.dev-watch]
description = "Start development with auto-reload"
dependencies = ["quality", "build", "runserver-watch"]

# ============================================================================
# CI/CD Workflow
# ============================================================================

[tasks.ci]
description = "Run CI pipeline (format, lint, build, test)"
dependencies = ["fmt-check", "clippy-check", "build", "test"]

# ============================================================================
# Verbosity Control
# ============================================================================

[tasks.runserver-v]
description = "Start the development server with verbose output"
command = "cargo"
args = ["run", "--bin", "manage", "runserver", "-v"]

[tasks.runserver-vv]
description = "Start the development server with very verbose output"
command = "cargo"
args = ["run", "--bin", "manage", "runserver", "-vv"]

[tasks.runserver-vvv]
description = "Start the development server with maximum verbosity"
command = "cargo"
args = ["run", "--bin", "manage", "runserver", "-vvv"]

# ============================================================================
# WASM Build (reinhardt-pages frontend)
# ============================================================================

[tasks.wasm-install-tools]
description = "Install WASM build tools (wasm-bindgen-cli pinned to match Cargo.lock)"
script = '''
# Keep this version in sync with the wasm-bindgen crate in Cargo.lock
cargo install wasm-bindgen-cli --version "0.2.118" --locked 2>/dev/null || true
'''

[tasks.wasm-install-test-tools]
description = "Install WASM browser test tools"
script = '''
if ! command -v wasm-pack >/dev/null 2>&1; then
	cargo install wasm-pack --locked
fi
'''

[tasks.wasm-compile-dev]
description = "Compile WASM library (debug)"
command = "cargo"
args = ["build", "--lib", "--target", "wasm32-unknown-unknown"]

[tasks.wasm-compile-release]
description = "Compile WASM library (release)"
command = "cargo"
args = ["build", "--lib", "--target", "wasm32-unknown-unknown", "--release"]

[tasks.wasm-bindgen-dev]
description = "Generate JS bindings for WASM (debug)"
script = '''
mkdir -p dist
TARGET_DIR="$(cargo metadata --no-deps --format-version=1 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin)['target_directory'])" 2>/dev/null || echo "../target")"
WASM_FILE="${TARGET_DIR}/wasm32-unknown-unknown/debug/reinhardt_cloud_dashboard.wasm"
if [ ! -f "$WASM_FILE" ]; then
	echo "Error: WASM file not found at $WASM_FILE"
	exit 1
fi
wasm-bindgen --target web "$WASM_FILE" --out-dir dist --debug
'''
dependencies = ["wasm-compile-dev"]

[tasks.wasm-bindgen-release]
description = "Generate JS bindings for WASM (release)"
script = '''
mkdir -p dist
TARGET_DIR="$(cargo metadata --no-deps --format-version=1 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin)['target_directory'])" 2>/dev/null || echo "../target")"
WASM_FILE="${TARGET_DIR}/wasm32-unknown-unknown/release/reinhardt_cloud_dashboard.wasm"
if [ ! -f "$WASM_FILE" ]; then
	echo "Error: WASM file not found at $WASM_FILE"
	exit 1
fi
wasm-bindgen --target web "$WASM_FILE" --out-dir dist
if command -v wasm-opt >/dev/null 2>&1; then
	echo "Optimizing WASM with wasm-opt..."
	wasm-opt -O3 dist/reinhardt_cloud_dashboard_bg.wasm -o dist/reinhardt_cloud_dashboard_bg.wasm
fi
'''
dependencies = ["wasm-compile-release"]

[tasks.wasm-build-dev]
description = "Full WASM debug build pipeline"
dependencies = ["wasm-install-tools", "wasm-bindgen-dev"]

[tasks.wasm-build-release]
description = "Full WASM release build pipeline"
dependencies = ["wasm-install-tools", "wasm-bindgen-release"]

[tasks.wasm-clean]
description = "Clean WASM build artifacts"
script = '''
rm -rf dist/
echo "Cleaned dist/"
'''

[tasks.runserver-pages]
description = "Start server with pages (runserver --with-pages rebuilds WASM by default; pass --no-override-wasm via `cargo make runserver-pages -- --no-override-wasm` to preserve dist/)"
command = "cargo"
args = ["run", "--bin", "manage", "runserver", "--with-pages", "${@}"]

# ============================================================================
# WASM browser tests (wasm-bindgen-test in headless Chrome)
# ============================================================================
#
# Closes the structural test gap behind the SPA navigation regression
# class — every framework-side fix in the chain
# (#4075 → #4088 → #4122 → #4203 → #4213 → #4217 → #4221) passed
# framework-side tests because no test exercised the consumer-facing
# `UnifiedRouter::client(...) → ClientLauncher → Router::push` topology.
#
# Tests live under `dashboard/tests/wasm/` per CLAUDE.md TD-3 and are
# gated behind the `wasm-spa-test` feature so default `cargo nextest
# run` (host target) skips them. Refs #574.

[tasks.wasm-spa-test]
description = "Run dashboard SPA browser tests under wasm-pack + headless Chrome (#574 regression suite)"
command = "wasm-pack"
args = [
	"test",
	"--headless",
	"--chrome",
	"--",
	"--features",
	"wasm-spa-test",
]
dependencies = ["wasm-install-tools", "wasm-install-test-tools"]

# Note: local infrastructure tasks (`infra-up` / `infra-down` /
# `infra-reset`) live in the workspace-root `Makefile.toml` and delegate to
# the framework-provided `manage infra` command. Workspace-root
# `cargo make runserver` uses `dashboard/scripts/runserver_with_infra.sh` to
# export the generated connection environment before launching the server.

