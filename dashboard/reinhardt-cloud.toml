# reinhardt-cloud.toml — Generated by `reinhardt-cloud init`
# All values are inferred from the reinhardt-web project.
# Edit to customize deployment configuration.

[app]
name = "reinhardt-cloud-dashboard"
image = "reinhardt-cloud-dashboard:latest"

[database]
engine = "postgresql"

[auth]
jwt = true

[health]
path = "/api/healthz/"
port = 8000
interval_seconds = 10

[services]
port = 80
target_port = 8000

[scale]
min_replicas = 2
max_replicas = 6
metric = "cpu"
target_value = 70

[env]
