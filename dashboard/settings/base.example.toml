# Base Settings for reinhardt-cloud
#
# This file contains the base configuration that is common across all environments.
# Environment-specific settings should be placed in their respective files:
# - local.toml (development)
# - staging.toml (staging environment)
# - production.toml (production environment)
#
# Getting started:
#   cp base.example.toml base.toml
#   # Export REINHARDT_CORE__SECRET_KEY and REINHARDT_DATABASE_PASSWORD.

[core]
debug = false
secret_key = "${REINHARDT_CORE__SECRET_KEY:?must be set to a unique cryptographically random value}"
allowed_hosts = []
root_urlconf = ""

# Middleware classes
middleware = []

# Security settings
[core.security]
append_slash = true
secure_ssl_redirect = false
secure_hsts_include_subdomains = false
secure_hsts_preload = false
session_cookie_secure = false
csrf_cookie_secure = false

# Database configurations (keyed by alias)
[core.databases.default]
engine = "postgresql"
host = "localhost"
port = 5432
name = "reinhardt_cloud_db"
user = "postgres"
password = { env = "REINHARDT_DATABASE_PASSWORD" }
options = {}

[i18n]
language_code = "en-us"
time_zone = "UTC"
use_i18n = true
use_tz = true

[static_files]
url = "/static/"
root = "static"

[media]
url = "/media/"
root = "media"

[cors]
# Allowed origins for OriginGuardMiddleware (exact match, no wildcards).
# OriginGuard filters out "*" — use explicit URLs.
allow_origins = ["http://localhost:8000", "http://127.0.0.1:8000"]

[email]
# SMTP backend configuration for transactional emails.
#
# Domain context (`reinhardt-cloud.dev`, verified via cloudflared/dig):
#   - NS: brynne/coleman.ns.cloudflare.com (Cloudflare-managed)
#   - MX: route{1,2,3}.mx.cloudflare.net (Cloudflare Email Routing — INBOUND only)
#   - SPF: "v=spf1 include:_spf.mx.cloudflare.net ~all"
#   - DKIM: cf2024-1._domainkey present (Cloudflare signing key)
#   - DMARC: p=none (monitoring)
#
# Cloudflare does NOT provide a public outbound SMTP relay, so production
# delivery requires a third-party provider (Resend / SendGrid / AWS SES /
# Postmark). When that provider is chosen, also extend the SPF record with
# `include:<provider-spf>` and publish the provider's DKIM selector.
#
# Suggested production overrides via REINHARDT_EMAIL__* env vars:
#   port 465 → use_ssl=true, use_tls=false  (implicit TLS)
#   port 587 → use_ssl=false, use_tls=true  (STARTTLS)
#
# Defaults below target Mailpit (`docker run mailpit`) for local development;
# `use_ssl`/`use_tls` are intentionally false because Mailpit serves plaintext
# on 1025. Production MUST override host/port/credentials via env vars.
host = "localhost"
port = 1025
from_email = "noreply@reinhardt-cloud.dev"
use_ssl = false
use_tls = false
# username = ""
# Set REINHARDT_EMAIL__PASSWORD in the runtime environment when SMTP auth is required.
# timeout = 30

[contacts]
# Contacts fragment required by settings-aware management commands.
admins = []
managers = []
