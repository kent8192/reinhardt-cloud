# Local Development Settings for Reinhardt Cloud
#
# Loaded when REINHARDT_ENV=local (default).
# Note: env-specific TOML replaces the entire [core] section from base.toml,
# so all required core fields must be specified here.
#
# Required env vars:
#   REINHARDT_CLOUD_JWT_SECRET
#   REINHARDT_CORE__SECRET_KEY
#   REINHARDT_DATABASE_PASSWORD

# JWT secret for cluster-agent and gRPC AuthService token signing.
# Resolved by `dashboard::config::settings::get_jwt_secret()`, which reads
# this top-level TOML key first and falls back to the
# `REINHARDT_CLOUD_JWT_SECRET` env var for container/CI overrides.
jwt_secret = "${REINHARDT_CLOUD_JWT_SECRET:?must be set to >= 32 bytes of random data}"

# Redis URL for cookie session storage. Resolved by
# `dashboard::config::settings::get_redis_url()`, which reads
# `REINHARDT_CLOUD_REDIS_URL` first and falls back to this TOML key.
#
# `${RC_REDIS_HOST:-localhost}` expands to the env var if set (the
# `.devcontainer/` sets `RC_REDIS_HOST=redis` to point at the compose
# service) and falls back to `localhost` for host-native development.
# The `RC_*` prefix is intentionally outside the `REINHARDT_*` namespace
# consumed by the dashboard `EnvSource` so interpolation helpers do not
# leak into the merged settings as unknown top-level keys.
redis_url = "redis://${RC_REDIS_HOST:-localhost}:6379/1"

[grpc]
bind_host = "127.0.0.1"

[core]
debug = true
secret_key = "${REINHARDT_CORE__SECRET_KEY:?must be set to a unique cryptographically random value}"
allowed_hosts = ["*"]
root_urlconf = ""

middleware = []

# Security settings (relaxed for development)
[core.security]
append_slash = true
session_cookie_secure = false
csrf_cookie_secure = false
secure_ssl_redirect = false
secure_hsts_include_subdomains = false
secure_hsts_preload = false

# Database configuration for local development.
# `${RC_DB_HOST:-localhost}` expands to the env var if set (the
# `.devcontainer/` sets `RC_DB_HOST=postgres` to point at the compose
# service) and falls back to `localhost` for host-native development.
# Numeric/bool fields (port) keep their native types and are overridden
# via the `REINHARDT_CORE__DATABASES__DEFAULT__PORT` env var when needed.
# The `RC_*` prefix is intentionally outside the `REINHARDT_*` namespace
# consumed by the dashboard `EnvSource` so interpolation helpers do not
# leak into the merged settings as unknown top-level keys.
[core.databases.default]
engine = "postgresql"
host = "${RC_DB_HOST:-localhost}"
port = 5432
name = "reinhardt_cloud_dev"
user = "postgres"
password = { env = "REINHARDT_DATABASE_PASSWORD" }
options = {}

[cors]
# Allowed origins for OriginGuardMiddleware (exact match, no wildcards).
# OriginGuard filters out "*" — use explicit URLs.
allow_origins = ["http://localhost:8000", "http://127.0.0.1:8000"]

[email]
# Local development prints verification/reset messages to stdout instead of
# requiring Mailpit. Override with `REINHARDT_EMAIL__BACKEND=smtp` plus the
# usual host/port settings when testing real SMTP delivery.
backend = "console"
from_email = "noreply@reinhardt-cloud.dev"
