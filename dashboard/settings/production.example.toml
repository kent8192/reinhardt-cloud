# Production Environment Settings — TEMPLATE
#
# This file is a documented reference for the production environment. It
# mirrors the schema of `production.toml` (which is loaded when
# REINHARDT_ENV=production) so deployers can compare the active config
# against a known-good shape.
#
# In normal deployments, `production.toml` is what the server actually loads;
# this `.example.toml` is *not* read at runtime. Use it as:
#   1. A reference for required keys when authoring overrides.
#   2. A starting point if `production.toml` ever needs to be regenerated.
#
# Note: env-specific TOML replaces the entire [core] section from base.toml,
# so all required core fields must be specified here.
#
# `production.toml` is safe-by-default and self-contained: required secrets use
# ${VAR:?message} interpolation that fails fast at startup if the env var is
# missing. Optional fields use ${VAR:-default} so deployers can override
# without forking the file. Numeric, boolean, and array fields keep TOML
# literals here and are overridden at the HighPriorityEnvSource layer
# (priority 60 > TomlFileSource priority 50) when the corresponding REINHARDT_*
# env var is set.
#
# Required env vars (no default — startup fails if unset):
#   REINHARDT_CLOUD_JWT_SECRET                       — top-level jwt_secret (>= 32 random bytes)
#   REINHARDT_CLOUD_REDIS_URL                        — top-level redis_url
#   REINHARDT_CORE__SECRET_KEY                       — [core].secret_key
#   REINHARDT_DATABASE_PASSWORD                      — both [core.databases.default].password.secret and [database].password
#   REINHARDT_EMAIL__HOST                            — [email].host (outbound provider; Cloudflare Email Routing is inbound-only)
#
# Optional env vars (have a documented default):
#   REINHARDT_DATABASE_HOST                          — [core.databases.default].host and [database].host (default: db.production.internal)
#   REINHARDT_DATABASE_NAME                          — [core.databases.default].name and [database].name (default: reinhardt_cloud)
#   REINHARDT_DATABASE_USER                          — [core.databases.default].user and [database].user (default: reinhardt)
#   REINHARDT_EMAIL__FROM_EMAIL                      — [email].from_email (default: noreply@reinhardt-cloud.dev)
#
# Numeric/boolean/array overrides via HighPriorityEnvSource:
#   REINHARDT_CORE__ALLOWED_HOSTS                    — [core].allowed_hosts (Vec<String>; pass JSON-array literal)
#   REINHARDT_DATABASE_PORT                          — [core.databases.default].port and [database].port (u16)
#   REINHARDT_EMAIL__BACKEND                         — backend type (e.g., "smtp")
#   REINHARDT_EMAIL__PORT                            — [email].port (u16)
#   REINHARDT_EMAIL__USERNAME                        — SMTP auth username
#   REINHARDT_EMAIL__PASSWORD                        — SMTP auth password (use Secret)
#   REINHARDT_EMAIL__USE_TLS                         — STARTTLS (bool; port 587 typical)
#   REINHARDT_EMAIL__USE_SSL                         — implicit TLS (bool; port 465 typical, takes precedence over USE_TLS)
#   REINHARDT_EMAIL__TIMEOUT                         — SMTP socket timeout in seconds (integer)

# JWT secret — MUST be overridden via REINHARDT_CLOUD_JWT_SECRET (>= 32 bytes
# of cryptographically random data).
jwt_secret = "${REINHARDT_CLOUD_JWT_SECRET:?must be set to >= 32 bytes of cryptographically random data}"

# Redis URL — MUST be overridden via REINHARDT_CLOUD_REDIS_URL.
redis_url = "${REINHARDT_CLOUD_REDIS_URL:?must point at the production Redis instance}"

[core]
debug = false
secret_key = "${REINHARDT_CORE__SECRET_KEY:?must be set to a unique cryptographically random value}"
allowed_hosts = ["reinhardt-cloud.dev", "www.reinhardt-cloud.dev"]
root_urlconf = ""

middleware = []

# Security settings (full production hardening)
[core.security]
append_slash = true
session_cookie_secure = true
csrf_cookie_secure = true
secure_ssl_redirect = true
secure_hsts_include_subdomains = true
secure_hsts_preload = true

# Database configuration — credentials MUST be overridden via REINHARDT_DATABASE_*
# env vars. The operator's inference/env_vars.rs::build_database_env_vars_from_secret
# injects REINHARDT_DATABASE_HOST/PORT/NAME/USER/PASSWORD with PASSWORD wired to
# a Kubernetes Secret.
[core.databases.default]
engine = "postgresql"
host = "${REINHARDT_DATABASE_HOST:-db.production.internal}"
port = 5432
name = "${REINHARDT_DATABASE_NAME:-reinhardt_cloud}"
user = "${REINHARDT_DATABASE_USER:-reinhardt}"
password = { secret = "${REINHARDT_DATABASE_PASSWORD:?must be supplied via Secret-backed env var}" }
options = {}

# Top-level [database] section required by reinhardt-web's runserver/migrate commands.
# Mirrors [core.databases.default] and consumes the same REINHARDT_DATABASE_* env vars.
[database]
engine = "postgresql"
host = "${REINHARDT_DATABASE_HOST:-db.production.internal}"
port = 5432
name = "${REINHARDT_DATABASE_NAME:-reinhardt_cloud}"
user = "${REINHARDT_DATABASE_USER:-reinhardt}"
password = "${REINHARDT_DATABASE_PASSWORD:?must be supplied via Secret-backed env var}"

[cors]
allow_origins = ["https://reinhardt-cloud.dev", "https://www.reinhardt-cloud.dev"]

# Production email delivery — Cloudflare Email Routing is INBOUND only
# (see base.toml [email] comment). Outbound delivery REQUIRES a third-party
# provider (Resend / SendGrid / AWS SES / Postmark) and the provider's SPF
# include + DKIM selector must be published on the reinhardt-cloud.dev DNS zone.
#
# Every `[email]` field below is overridable at runtime via the
# `REINHARDT_EMAIL__*` env-var family (see file header for the full list).
# Credentials and TLS toggles SHOULD be set via Secret-backed env vars rather
# than this template.
#
# Defaults below assume STARTTLS on 587; switch to use_ssl=true / use_tls=false
# for implicit-TLS providers on 465.
[email]
host = "${REINHARDT_EMAIL__HOST:?must point at outbound provider (Resend/SendGrid/SES/Postmark)}"
port = 587
from_email = "${REINHARDT_EMAIL__FROM_EMAIL:-noreply@reinhardt-cloud.dev}"
use_ssl = false
use_tls = true
