# RBAC for the self-hosted Reinhardt Cloud Dashboard.
#
# The dashboard reads Project resources to display application state. Keep this
# namespace-scoped and read-only so the dashboard workload does not inherit the
# broader operator permissions.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: reinhardt-cloud-dashboard
  namespace: reinhardt-cloud-system
  labels:
    app.kubernetes.io/name: reinhardt-cloud-dashboard
    app.kubernetes.io/instance: reinhardt-cloud-dashboard
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/part-of: reinhardt-cloud
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: reinhardt-cloud-dashboard-project-reader
  namespace: reinhardt-cloud-system
  labels:
    app.kubernetes.io/name: reinhardt-cloud-dashboard
    app.kubernetes.io/instance: reinhardt-cloud-dashboard
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/part-of: reinhardt-cloud
rules:
  - apiGroups:
      - paas.reinhardt-cloud.dev
    resources:
      - projects
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: reinhardt-cloud-dashboard-project-reader
  namespace: reinhardt-cloud-system
  labels:
    app.kubernetes.io/name: reinhardt-cloud-dashboard
    app.kubernetes.io/instance: reinhardt-cloud-dashboard
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/part-of: reinhardt-cloud
subjects:
  - kind: ServiceAccount
    name: reinhardt-cloud-dashboard
    namespace: reinhardt-cloud-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: reinhardt-cloud-dashboard-project-reader
