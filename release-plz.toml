# release-plz configuration for Reinhardt Cloud project
# Documentation: https://release-plz.ieni.dev/docs/config
#
# Crate structure:
#   Library crates (publish = false): reinhardt-cloud-types, reinhardt-cloud-core,
#     reinhardt-cloud-k8s, reinhardt-cloud-proto, reinhardt-cloud-grpc,
#     reinhardt-cloud-telemetry
#   Binary/application crates (GitHub Releases): reinhardt-cloud,
#     reinhardt-cloud-dashboard, reinhardt-cloud-operator, reinhardt-cloud-cli,
#     reinhardt-cloud-agent

[workspace]
# Changelog settings
changelog_update = true

# PR settings
# IMPORTANT: Branch prefix MUST start with "release-plz-" for native two-step release workflow.
pr_branch_prefix = "release-plz-"
pr_labels = ["release", "automated"]
pr_name = "chore: release"

# Git release settings
git_release_enable = false
git_tag_enable = false
git_tag_name = "{{ package }}@v{{ version }}"
git_release_type = "auto"
release = false

# Publish settings
# semver_check disabled at workspace level: library crates are internal (publish = false)
# and binary/application crates are not published to crates.io.
semver_check = false
publish_timeout = "10m"
dependencies_update = true
release_always = true
publish_no_verify = true

# ── Application crate ─────────────────────────────────────────────────────
# Reinhardt startproject application. Distributed via Docker image / GitHub Releases.

[[package]]
name = "reinhardt-cloud"
release = true
publish = false
git_release_enable = true
git_tag_enable = true
version_group = "reinhardt-cloud"

# ── Internal library crates ──────────────────────────────────────────────────
# These crates are workspace-internal and not published to crates.io.
# release-plz manages their versions and changelog entries without creating
# package-scoped GitHub Releases or tags.

[[package]]
name = "reinhardt-cloud-types"
release = true
publish = false
git_release_enable = false
git_tag_enable = false
version_group = "reinhardt-cloud"

[[package]]
name = "reinhardt-cloud-core"
release = true
publish = false
git_release_enable = false
git_tag_enable = false
version_group = "reinhardt-cloud"

[[package]]
name = "reinhardt-cloud-k8s"
release = true
publish = false
git_release_enable = false
git_tag_enable = false
version_group = "reinhardt-cloud"

[[package]]
name = "reinhardt-cloud-proto"
release = true
publish = false
git_release_enable = false
git_tag_enable = false
version_group = "reinhardt-cloud"

[[package]]
name = "reinhardt-cloud-grpc"
release = true
publish = false
git_release_enable = false
git_tag_enable = false
version_group = "reinhardt-cloud"

[[package]]
name = "reinhardt-cloud-telemetry"
release = true
publish = false
git_release_enable = false
git_tag_enable = false
version_group = "reinhardt-cloud"

# ── Binary/application crates (GitHub Releases) ─────────────────────────────
# These crates are distributed as GitHub Releases and container images
# instead of crates.io packages.

[[package]]
name = "reinhardt-cloud-dashboard"
release = true
publish = false
git_release_enable = true
git_tag_enable = true
version_group = "reinhardt-cloud"

[[package]]
name = "reinhardt-cloud-operator"
release = true
publish = false
git_release_enable = true
git_tag_enable = true
version_group = "reinhardt-cloud"

[[package]]
name = "reinhardt-cloud-cli"
release = true
publish = false
git_release_enable = true
git_tag_enable = true
version_group = "reinhardt-cloud"

[[package]]
name = "reinhardt-cloud-agent"
release = true
publish = false
git_release_enable = true
git_tag_enable = true
version_group = "reinhardt-cloud"

# ── Non-release workspace crates ────────────────────────────────────────────

[[package]]
name = "reinhardt-cloud-integration-tests"
release = false
publish = false
git_release_enable = false
git_tag_enable = false

[changelog]
protect_breaking_commits = true
sort_commits = "oldest"

# Commit parsers: evaluated in order, first match wins.
commit_parsers = [
  # Skip: automated commits not relevant to release notes
  { message = "^chore: release", skip = true },
  { message = "^Merge", skip = true },
  { message = "^Revert \"", skip = true },
  { message = "^Initial plan", skip = true },
  # Map: commit types to Keep a Changelog sections
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Changed" },
  { message = "^docs", group = "Documentation" },
  { message = "^revert", group = "Reverted" },
  { message = "^deprecated", group = "Deprecated" },
  { message = "^security", group = "Security" },
  { message = "^chore", group = "Maintenance" },
  { message = "^ci", group = "Maintenance" },
  { message = "^build", group = "Maintenance" },
  { message = "^test", group = "Testing" },
  { message = "^style", group = "Styling" },
  # Catch-all
  { message = "^.*", group = "Other" },
]

# Convert GitHub issue/PR references to clickable links
commit_preprocessors = [
  { pattern = '#(\d+)', replace = "[#${1}](https://github.com/kent8192/reinhardt-cloud/issues/${1})" },
]
